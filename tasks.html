  { id: "content", label: "Контент" },
  { id: "assist",  label: "Ассистенс" },
  { id: "lang",    label: "Языки" },
];

const QUICK_FILTERS = [
  { id: "remote",   label: "Удалённо",      check: (t) => t.place === "Удалённо" },
  { id: "urgent",   label: "Срочные",       check: (t) => t.urgent },
  { id: "pro",      label: "PRO-задачи",    check: (t) => t.pro },
  { id: "high",     label: "От 10 000 ₽",   check: (t) => t.pay >= 10000 },
];

/* ─── Task list card ─── */
function TaskCard({ t, active, onClick }) {
  return (
    <article className={"task-card " + (active ? "is-active" : "")} onClick={onClick}>
      <div>
        <div className="task-card__head">
          <span className="task-card__cat">{t.category}</span>
          {t.urgent && <span className="task-card__urgent">⚡ Срочно</span>}
          {t.pro && <span className="task-card__urgent" style={{background:"#FFF6E0",color:"#B5891A"}}>PRO</span>}
        </div>
        <h3 className="task-card__title">{t.title}</h3>
        <div className="task-card__meta">
          <span>📍 {t.place}</span>
          <span>📅 {t.deadline}</span>
          <span>⏱ {t.duration}</span>
        </div>
      </div>
      <div className="task-card__pay">
        {t.pay.toLocaleString("ru-RU")} ₽
        <sub>за задание</sub>
      </div>

      <div className="task-card__skills">
        {t.skills.slice(0, 4).map(s => <span key={s} className="task-card__skill">{s}</span>)}
      </div>

      <div className="task-card__bottom">
        <div className="task-card__customer">
          <div className="task-card__customer-avatar">{t.customer.initials}</div>
          <span>{t.customer.name} · ★ {t.customer.rating}</span>
        </div>
        <div className="task-card__resp">
          <strong>{t.responses}</strong> откликов · {t.views} просмотров
        </div>
      </div>
    </article>
  );
}

/* ─── Detail panel ─── */
function TaskDetail({ t }) {
  if (!t) {
    return (
      <div className="task-detail">
        <div className="task-detail__empty">
          <div style={{fontSize:48,marginBottom:12}}>👈</div>
          <div style={{fontFamily:"'Tektur',monospace",fontSize:18,fontWeight:700,textTransform:"uppercase",color:"var(--c-navy)",marginBottom:6}}>Выберите задачу</div>
          <div style={{fontSize:14}}>Кликни на любую карточку слева, чтобы посмотреть детали и откликнуться.</div>
        </div>
      </div>
    );
  }

  return (
    <div className="task-detail">
      <div className="task-detail__head">
        <span className="task-detail__cat">{t.category}</span>
        <h2 className="task-detail__title">{t.title}</h2>
        <div className="task-detail__pay">
          {t.pay.toLocaleString("ru-RU")} ₽
          <sub>{t.payType === "fixed" ? "фиксированный бюджет" : "договорной"}</sub>
        </div>
      </div>

      <div className="task-detail__quick">
        <div className="task-detail__quick-item">
          <div className="task-detail__quick-label">Формат</div>
          <div className="task-detail__quick-val">{t.place}</div>
        </div>
        <div className="task-detail__quick-item">
          <div className="task-detail__quick-label">Город</div>
          <div className="task-detail__quick-val">{t.city}</div>
        </div>
        <div className="task-detail__quick-item">
          <div className="task-detail__quick-label">Дедлайн</div>
          <div className="task-detail__quick-val">{t.deadline}</div>
        </div>
        <div className="task-detail__quick-item">
          <div className="task-detail__quick-label">Длительность</div>
          <div className="task-detail__quick-val">{t.duration}</div>
        </div>
        <div className="task-detail__quick-item">
          <div className="task-detail__quick-label">Опубликована</div>
          <div className="task-detail__quick-val">{t.posted}</div>
        </div>
        <div className="task-detail__quick-item">
          <div className="task-detail__quick-label">Откликов</div>
          <div className="task-detail__quick-val">{t.responses} из ∞</div>
        </div>
      </div>

      <div className="task-detail__section">
        <h4>// Описание</h4>
        <p>{t.description}</p>
      </div>

      <div className="task-detail__section">
        <h4>// Требования</h4>
        <p>{t.requirements}</p>
      </div>

      <div className="task-detail__section">
        <h4>// Нужные навыки</h4>
        <div className="task-detail__skills">
          {t.skills.map(s => <span key={s}>{s}</span>)}
        </div>
      </div>

      <div className="task-detail__section">
        <h4>// Заказчик</h4>
        <div className="task-detail__customer">
          <div className="task-detail__customer-avatar">{t.customer.initials}</div>
          <div>
            <div className="task-detail__customer-name">
              {t.customer.name} {t.customer.verified && <span style={{color:"var(--c-green-deep)",fontSize:12}}>✓</span>}
            </div>
            <div className="task-detail__customer-meta">{t.customer.deals} закрытых сделок</div>
          </div>
          <div className="task-detail__customer-rating">{t.customer.rating} ★</div>
        </div>
      </div>

      <div className="task-detail__cta">
        <button className="btn-accent">Откликнуться ▸▸▸</button>
        <button className="btn-ghost">Сохранить в избранное</button>
        <button className="btn-ghost">Поделиться</button>
        <div className="task-detail__notice">
          💡 Эскроу гарантирует оплату — деньги заказчика блокируются на платформе и переходят к тебе после приёмки работы.
        </div>
      </div>
    </div>
  );
}

/* ─── Main App ─── */
function App() {
  const [activeCat, setActiveCat] = useState("all");
  const [quickActive, setQuickActive] = useState(new Set());
  const [search, setSearch] = useState("");
  const [sort, setSort] = useState("fresh");
  const [activeId, setActiveId] = useState(TASKS[0].id);

  const toggleQuick = (id) => {
    const next = new Set(quickActive);
    next.has(id) ? next.delete(id) : next.add(id);
    setQuickActive(next);
  };

  const filtered = useMemo(() => {
    let arr = [...TASKS];
    if (activeCat !== "all") arr = arr.filter(t => t.catId === activeCat);
    quickActive.forEach((id) => {
      const f = QUICK_FILTERS.find(q => q.id === id);
      if (f) arr = arr.filter(f.check);
    });
    if (search.trim()) {
      const q = search.toLowerCase();
      arr = arr.filter(t =>
        t.title.toLowerCase().includes(q) ||
        t.skills.some(s => s.toLowerCase().includes(q)) ||
        t.customer.name.toLowerCase().includes(q)
      );
    }
    if (sort === "pay-desc") arr.sort((a, b) => b.pay - a.pay);
    else if (sort === "pay-asc") arr.sort((a, b) => a.pay - b.pay);
    else if (sort === "popular") arr.sort((a, b) => b.responses - a.responses);
    return arr;
  }, [activeCat, quickActive, search, sort]);

  const active = filtered.find(t => t.id === activeId) || filtered[0];

  /* keep selection valid when filters change */
  useEffect(() => {
    if (filtered.length > 0 && !filtered.find(t => t.id === activeId)) {
      setActiveId(filtered[0].id);
    }
  }, [filtered, activeId]);

  return (
    <>
      <Header />
      <main>
        <section className="tasks-shell tasks-hero">
          <div className="tasks-hero__top">
            <h1 className="t-display t-display-lg" style={{margin:0}}>Каталог задач</h1>
            <span className="tasks-hero__count">{filtered.length}</span>
          </div>

          <div className="tasks-search">
            <input
              className="tasks-search__input"
              type="text"
              placeholder="Поиск по навыку, заказчику, ключевому слову…"
              value={search}
              onChange={e => setSearch(e.target.value)}
            />
            <a className="btn btn-primary" href="cabinet.html"
               style={{whiteSpace:"nowrap",borderRadius:14,padding:"14px 24px"}}>
              Мой кабинет
            </a>
          </div>

          <div className="tasks-filters">
            {CATEGORIES.map(c => (
              <button key={c.id}
                className={"tasks-filter " + (activeCat === c.id ? "active" : "")}
                onClick={() => setActiveCat(c.id)}>
                {c.label}
              </button>
            ))}
            <div style={{width:1,background:"var(--c-border)",margin:"0 6px"}}/>
            {QUICK_FILTERS.map(q => (
              <button key={q.id}
                className={"tasks-filter " + (quickActive.has(q.id) ? "active" : "")}
                onClick={() => toggleQuick(q.id)}>
                {q.label}
              </button>
            ))}
            <div className="tasks-sort">
              Сортировка:
              <select value={sort} onChange={e => setSort(e.target.value)}>
                <option value="fresh">Сначала свежие</option>
                <option value="pay-desc">По убыванию оплаты</option>
                <option value="pay-asc">По возрастанию оплаты</option>
                <option value="popular">По популярности</option>
              </select>
            </div>
          </div>

          {filtered.length === 0 ? (
            <div className="tasks-empty">
              <div style={{fontSize:48,marginBottom:12}}>🔍</div>
              <div style={{fontFamily:"'Tektur',monospace",fontSize:22,fontWeight:700,textTransform:"uppercase",color:"var(--c-navy)"}}>Под фильтры ничего не нашлось</div>
              <div style={{marginTop:8}}>Сбрось фильтры или попробуй другой запрос</div>
            </div>
          ) : (
            <div className="tasks-grid">
              <div className="tasks-list">
                {filtered.map(t => (
                  <TaskCard key={t.id} t={t} active={active && active.id === t.id} onClick={() => setActiveId(t.id)}/>
                ))}
              </div>
              <TaskDetail t={active}/>
            </div>
          )}
        </section>
      </main>

      <footer style={{borderTop:"1px solid var(--c-border)",padding:"32px var(--pad-x)",display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:16,maxWidth:1480,margin:"0 auto"}}>
        <a href="index.html" className="logo" style={{fontSize:18}}>
          <span style={{fontFamily:"'Tektur',monospace",fontWeight:700,color:"var(--c-navy)"}}>СтудРадар</span>
        </a>
        <span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:12,color:"var(--c-mute)"}}>
          © 2026 СтудРадар · ХМАО-Югра
        </span>
      </footer>
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
