<!DOCTYPE html>
<html lang="ru" data-mode="student">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Мария Иванова — СтудРадар</title>
  <link rel="stylesheet" href="styles.css">
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <style>
    /* ── Profile layout ── */
    .prof-layout {
      max-width: 1480px;
      margin: 0 auto;
      padding: 0 var(--pad-x);
    }

    /* Hero strip — 2 columns: left (photo + contact) | right (main info), the third block goes below right */
    .prof-hero {
      position: relative;
      padding: 48px 0 0;
      display: grid;
      grid-template-columns: 340px 1fr;
      gap: 48px;
      align-items: start;
    }

    /* Left — sidebar */
    .prof-sidebar {}
    .prof-photo-wrap {
      position: relative;
      margin-bottom: 22px;
    }
    .prof-photo {
      width: 100%;
      aspect-ratio: 1/1;
      border-radius: 24px;
      overflow: hidden;
      background: linear-gradient(135deg,#0040A0,#2465C5);
      position: relative;
    }
    .prof-photo img {
      width: 100%; height: 100%;
      object-fit: cover; display: block;
    }
    .prof-online {
      position: absolute; top: 16px; right: 16px;
      background: rgba(255,255,255,.95);
      border-radius: 999px;
      padding: 5px 14px;
      font-family: 'JetBrains Mono',monospace;
      font-size: 11px;
      color: var(--c-mute);
      letter-spacing: 0.03em;
      display: flex; align-items: center; gap: 6px;
    }
    .prof-online::before {
      content:""; width:7px; height:7px; border-radius:50%;
      background: var(--c-green-deep);
    }
    .prof-pro-badge {
      position: absolute; top: 16px; left: 16px;
      background: var(--c-blue-deep);
      color: #fff;
      border-radius: 999px;
      padding: 6px 14px;
      font-family: 'JetBrains Mono',monospace;
      font-size: 12px; font-weight: 700;
      letter-spacing: 0.05em;
    }

    /* info cells */
    .prof-info { display: grid; gap: 20px; margin-top: 4px; }
    .prof-info-item label {
      font-family: 'Onest','Manrope',sans-serif;
      font-size: 14px;
      color: rgba(0,0,0,.42);
      display: block;
      margin-bottom: 4px;
    }
    .prof-info-item span {
      font-family: 'Onest','Manrope',sans-serif;
      font-size: 16px;
      color: var(--c-ink);
      line-height: 1.3;
    }
    .prof-socials { display: flex; gap: 8px; margin-top: 4px; }
    .prof-social {
      width: 44px; height: 44px;
      border-radius: 12px;
      background: var(--c-cream);
      display: grid; place-items: center;
      color: var(--c-ink);
      text-decoration: none;
    }
    .prof-social:hover { background: var(--c-blue-deep); color: #fff; }

    /* Center — main content */
    .prof-main {}
    .prof-name-row {
      display: flex; align-items: baseline; gap: 16px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }
    .prof-name {
      font-family: 'Tektur',monospace;
      font-weight: 700;
      font-size: clamp(32px,4vw,60px);
      text-transform: uppercase;
      color: var(--c-navy);
      letter-spacing: -0.01em;
      line-height: 0.95;
      margin: 0;
    }
    .prof-rating {
      display: flex; align-items: center; gap: 6px;
      font-family: 'Tektur',monospace;
      font-weight: 700;
      font-size: 22px;
      color: var(--c-orange-deep);
    }
    .prof-stats {
      display: flex; gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 32px;
    }
    .prof-stat {
      background: var(--c-white);
      border: 1px solid var(--c-border);
      border-radius: 18px;
      padding: 16px 22px;
      min-width: 130px;
      text-align: center;
    }
    .prof-stat__num {
      font-family: 'Tektur',monospace;
      font-weight: 700;
      font-size: 36px;
      color: var(--c-blue-deep);
      display: block;
      letter-spacing: -0.02em;
      line-height: 1;
    }
    .prof-stat__label {
      font-size: 13px;
      color: var(--c-mute);
      margin-top: 4px;
      display: block;
    }

    .prof-about-title {
      font-family: 'Tektur',monospace;
      font-weight: 700;
      font-size: clamp(24px,2.5vw,40px);
      text-transform: uppercase;
      color: var(--c-navy);
      margin: 0 0 16px;
    }
    .prof-about-text {
      font-family: 'Onest','Manrope',sans-serif;
      font-size: 17px;
      line-height: 1.65;
      color: var(--c-text);
      margin: 0 0 32px;
      white-space: pre-line;
    }

    /* Tags */
    .prof-tags-section { margin-bottom: 28px; }
    .prof-tags-label {
      font-family: 'Onest','Manrope',sans-serif;
      font-size: 14px;
      color: rgba(0,0,0,.42);
      margin-bottom: 10px;
    }
    .prof-tags { display: flex; flex-wrap: wrap; gap: 8px; }
    .prof-tag {
      font-size: 14px;
      background: var(--c-blue-soft);
      color: var(--c-blue-deep);
      padding: 7px 16px;
      border-radius: 999px;
    }
    .prof-skill-tag {
      font-size: 13.5px;
      background: var(--c-cream);
      color: var(--c-ink);
      padding: 7px 14px;
      border-radius: 999px;
    }
    .prof-more-link {
      font-family: 'Onest','Manrope',sans-serif;
      font-size: 15px;
      color: var(--c-blue-deep);
      text-decoration: none;
      margin-top: 8px;
      display: inline-block;
    }

    /* Right — sidebar */
    .prof-right { display: flex; flex-direction: column; gap: 28px; }
    .prof-right-section h3 {
      font-family: 'Tektur',monospace;
      font-weight: 700;
      font-size: clamp(18px,1.8vw,28px);
      text-transform: uppercase;
      color: var(--c-navy);
      margin: 0 0 14px;
    }
    .prof-cert-list { display: grid; gap: 8px; }
    .prof-cert {
      display: flex; align-items: center; gap: 10px;
      padding: 11px 16px;
      background: var(--c-white);
      border: 1px solid var(--c-border);
      border-radius: 14px;
      font-family: 'Onest','Manrope',sans-serif;
      font-size: 14px;
      color: var(--c-ink);
    }
    .prof-cert::before {
      content:"✓";
      width:22px; height:22px;
      border-radius:50%;
      background: var(--c-blue-soft);
      color: var(--c-blue-deep);
      display:grid; place-items:center;
      font-size:12px; font-weight:700;
      flex-shrink:0;
    }

    /* Video card */
    .prof-video {
      position: relative;
      aspect-ratio: 16/10;
      border-radius: 20px;
      background: linear-gradient(rgba(0,64,157,.5),rgba(0,64,157,.5)),
                  url('assets/student-photo.png') center/cover no-repeat;
      overflow: hidden;
      cursor: pointer;
    }
    .prof-video__play {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%,-50%);
      width: 52px; height: 52px;
      border-radius: 50%;
      background: rgba(255,255,255,.9);
      display: grid; place-items: center;
      color: var(--c-blue-deep);
    }
    .prof-video__play svg { margin-left: 3px; }

    /* CTA buttons */
    .prof-cta {
      display: flex; gap: 12px;
      flex-wrap: wrap;
      margin: 32px 0;
    }

    /* Divider */
    .prof-divider {
      border: none;
      border-top: 1px solid var(--c-border);
      margin: 48px 0;
    }

    /* Portfolio */
    .prof-portfolio { }
    .prof-portfolio-grid {
      display: grid;
      grid-template-columns: repeat(3,1fr);
      gap: 14px;
      margin-top: 24px;
    }
    .prof-portfolio-card {
      background: var(--c-white);
      border: 1px solid var(--c-border);
      border-radius: 22px;
      overflow: hidden;
    }
    .prof-portfolio-img {
      aspect-ratio: 16/9;
      background: repeating-linear-gradient(135deg,#DCDCDE 0 10px,#C8C8CA 10px 20px);
      position: relative;
    }
    .prof-portfolio-img::after {
      content: attr(data-label);
      position: absolute; left:12px; bottom:10px;
      font-family:'JetBrains Mono',monospace;
      font-size:11px; letter-spacing:.04em; text-transform:uppercase;
      background:rgba(255,255,255,.9);
      color: var(--c-navy);
      padding: 3px 10px; border-radius:999px;
    }
    .prof-portfolio-body { padding: 16px 18px; }
    .prof-portfolio-title {
      font-family: 'Onest','Manrope',sans-serif;
      font-weight: 600; font-size: 15px;
      color: var(--c-ink); margin:0 0 6px;
    }
    .prof-portfolio-meta {
      font-family: 'JetBrains Mono',monospace;
      font-size: 12px; color: var(--c-mute);
    }

    /* Reviews */
    .prof-reviews-grid {
      display: grid;
      grid-template-columns: repeat(3,1fr);
      gap: 16px;
      margin-top: 24px;
    }
    .prof-review {
      background: var(--c-white);
      border: 1px solid var(--c-border);
      border-radius: 22px;
      padding: 24px;
      display: flex; flex-direction:column; gap:14px;
    }
    .prof-review__company {
      font-family: 'Tektur',monospace;
      font-weight: 700; font-size: 16px;
      text-transform: uppercase;
      color: var(--c-navy); margin:0;
    }
    .prof-review__stars { display:flex; gap:3px; color: var(--c-orange); }
    .prof-review__text {
      font-family: 'Onest','Manrope',sans-serif;
      font-size: 14.5px; line-height:1.55;
      color: var(--c-text);
      margin:0;
      flex: 1;
    }
    .prof-review__footer {
      font-family:'JetBrains Mono',monospace;
      font-size:11.5px; color:var(--c-mute);
      border-top:1px solid var(--c-border);
      padding-top:12px;
      display:flex; gap:8px; align-items:center;
    }

    /* Tasks list */
    .prof-tasks-list { display:grid; gap:10px; margin-top:20px; }
    .prof-task-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 16px;
      align-items: center;
      padding: 16px 20px;
      background: var(--c-white);
      border: 1px solid var(--c-border);
      border-radius: 16px;
      text-decoration:none; color:inherit;
      transition: border-color .15s, transform .15s;
    }
    .prof-task-row:hover { border-color: var(--c-blue); transform:translateX(4px); }
    .prof-task-row__title {
      font-family:'Onest','Manrope',sans-serif;
      font-weight:600; font-size:15.5px;
      color:var(--c-ink);
    }
    .prof-task-row__meta {
      font-family:'JetBrains Mono',monospace;
      font-size:11.5px; color:var(--c-mute);
      margin-top:3px;
    }
    .prof-task-row__check {
      width:28px; height:28px; border-radius:50%;
      background:var(--c-blue-soft);
      display:grid; place-items:center;
      color:var(--c-blue-deep); flex-shrink:0;
    }

    /* PDF download button */
    .btn-pdf {
      background: var(--c-orange);
      color: #fff;
      border-radius: 13px;
      padding: 18px 32px;
      font-family: 'Tektur',monospace;
      font-weight: 700;
      font-size: 18px;
      letter-spacing: 0.02em;
      display:inline-flex; align-items:center; gap:12px;
      cursor:pointer; border:none;
      transition: background .15s, transform .15s;
    }
    .btn-pdf:hover { background: var(--c-orange-deep); transform:translateY(-1px); }

    /* Breadcrumb */
    .prof-breadcrumb {
      display:flex; align-items:center; gap:10px;
      padding: 20px 0 0;
      font-family:'JetBrains Mono',monospace;
      font-size:12px; color:var(--c-mute);
      letter-spacing:.03em;
    }
    .prof-breadcrumb a { color:var(--c-mute); text-decoration:none; }
    .prof-breadcrumb a:hover { color:var(--c-blue); }
    .prof-breadcrumb span { color:var(--c-ink); }

    /* Propose task modal */
    .propose-modal { max-width:480px; }

    /* Right column main wrapper (now contains main + below-grid) */
    .prof-right-col { display: flex; flex-direction: column; gap: 28px; }

    /* "Third" block under right column — laid out as horizontal grid */
    .prof-below {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 22px;
      margin-top: 12px;
    }
    .prof-below .prof-right-section h3 { font-size: clamp(18px,1.6vw,22px); }
    .prof-below .prof-video { aspect-ratio: 4/3; }

    /* responsive */
    @media(max-width:1200px){
      .prof-hero { grid-template-columns:300px 1fr; }
      .prof-portfolio-grid, .prof-reviews-grid { grid-template-columns: repeat(2,1fr); }
      .prof-below { grid-template-columns: repeat(2, 1fr); }
    }
    @media(max-width:800px){
      .prof-hero { grid-template-columns:1fr; }
      .prof-stats { gap:8px; }
      .prof-portfolio-grid, .prof-reviews-grid { grid-template-columns:1fr; }
      .prof-below { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect } = React;

/* ── Star component ─────────────────── */
function Stars({ n = 5 }) {
  return (
    <div style={{display:"flex",gap:3}}>
      {Array.from({length:5}).map((_,i) => (
        <svg key={i} width="14" height="14" viewBox="0 0 24 24"
          fill={i < n ? "#DD5444" : "#E5E7EC"}>
          <path d="M12 2 15.09 8.26 22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/>
        </svg>
      ))}
    </div>
  );
}

/* ── Modal ──────────────────────────── */
function ProposeModal({ onClose }) {
  const [sent, setSent] = useState(false);
  return (
    <div className="modal-backdrop" onClick={onClose}>
      <div className="modal propose-modal" onClick={e => e.stopPropagation()}>
        <button className="modal__close" onClick={onClose}>×</button>
        {sent ? (
          <div style={{textAlign:"center",padding:"20px 0"}}>
            <div style={{fontSize:48,marginBottom:16}}>✓</div>
            <h3 style={{fontFamily:"'Tektur',monospace",textTransform:"uppercase",fontSize:26}}>Предложение отправлено</h3>
            <p style={{color:"var(--c-mute)",fontSize:15}}>Мария получит уведомление и ответит вам в течение суток.</p>
            <button className="btn btn-primary" style={{marginTop:16,justifyContent:"center",width:"100%"}} onClick={onClose}>Закрыть</button>
          </div>
        ) : (
          <>
            <h3 style={{fontFamily:"'Tektur',monospace",textTransform:"uppercase",fontSize:26,margin:"0 0 8px",color:"var(--c-navy)"}}>Предложить задачу</h3>
            <p style={{color:"var(--c-mute)",fontSize:14,margin:"0 0 20px"}}>Опишите задачу — Мария получит уведомление и сможет принять или отклонить предложение.</p>
            <form onSubmit={e=>{e.preventDefault();setSent(true);}} style={{display:"grid",gap:14}}>
              <label className="field">
                <span>Название задачи</span>
                <input placeholder="Переводчик на конференцию, 2 дня" required/>
              </label>
              <label className="field">
                <span>Дата и место</span>
                <input placeholder="14–15 июня, Ханты-Мансийск" required/>
              </label>
              <label className="field">
                <span>Оплата (₽)</span>
                <input type="number" placeholder="12 000" required/>
              </label>
              <label className="field">
                <span>Описание</span>
                <textarea placeholder="Подробности задачи, требования, ожидания…" style={{minHeight:80}}/>
              </label>
              <label className="field">
                <span>Ваш e-mail для ответа</span>
                <input type="email" placeholder="hr@company.ru" required/>
              </label>
              <button type="submit" className="btn btn-accent" style={{justifyContent:"center",marginTop:4}}>
                Отправить предложение ▸▸▸
              </button>
              <p style={{fontFamily:"'JetBrains Mono',monospace",fontSize:11,color:"var(--c-mute)",margin:0}}>
                Платформа выступает гарантом: оплата резервируется через эскроу до приёмки.
              </p>
            </form>
          </>
        )}
      </div>
    </div>
  );
}

/* ── Profile App ────────────────────── */
function App() {
  const [modal, setModal] = useState(false);
  const [activeTab, setActiveTab] = useState("about");

  const tabs = [
    {id:"about",  label:"О себе"},
    {id:"portfolio", label:"Портфолио"},
    {id:"reviews", label:"Отзывы · 23"},
  ];

  const reviews = [
    { company:"КВЦ Югра-Экспо", stars:5, text:"Перед Марией стояла сложная задача — за один день познакомить международную пресс-группу с экспозицией музея, ответить на каверзные вопросы и показать город. Справилась на «отлично»! Её глубокие знания истории края и уверенный английский произвели на гостей великолепное впечатление.", date:"Март 2025", task:"Гид-переводчик для пресс-тура" },
    { company:"Технопарк Югры", stars:5, text:"Хотим выразить благодарность Марии за профессиональную работу по сопровождению наших иностранных партнёров. Мария не только безупречно справилась с синхронным переводом на технических секциях, но и проявила себя как ответственный координатор.", date:"Февраль 2025", task:"Синхронный перевод на конференции" },
    { company:"IT-Forum Югра", stars:5, text:"Работали с Марией на крупном форуме — организация, пунктуальность и языковая точность на высшем уровне. Гости из Азии остались в восторге. Обязательно приглашу снова.", date:"Ноябрь 2024", task:"Синхронный перевод + координация делегации" },
  ];

  const portfolio = [
    { title:"Гид-переводчик, Музей природы и человека", meta:"Март 2025 · Ханты-Мансийск", label:"Экскурсия EN" },
    { title:"Синхронный перевод, IT-Forum Югра 2024", meta:"Ноябрь 2024 · Ханты-Мансийск", label:"IT-Forum 2024" },
    { title:"Координация делегации, Чемпионат азиатских городов", meta:"Май 2025 · Ханты-Мансийск", label:"Чемпионат 2025" },
    { title:"Переводчик, Дух огня — Международный фестиваль", meta:"Апрель 2025 · Ханты-Мансийск", label:"Дух огня 2025" },
    { title:"Создание системы навигации для общежитий", meta:"Февраль 2025 · Удалённо", label:"UX-проект" },
    { title:"Волонтёр международного мероприятия — Экспо ХМАО", meta:"Декабрь 2024 · Ханты-Мансийск", label:"Экспо ХМАО" },
  ];

  const tasks = [
    { title:"Создание системы навигации для общежитий", meta:"Февраль 2025 · Удалённо" },
    { title:"Волонтёр международного мероприятия", meta:"Декабрь 2024 · Ханты-Мансийск" },
    { title:"Синхронный перевод на IT-Forum", meta:"Ноябрь 2024 · Ханты-Мансийск" },
  ];

  return (
    <>
      {/* Header */}
      <header className="site-header">
        <div className="site-header__inner">
          <a className="logo" href="index.html">
